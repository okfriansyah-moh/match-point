<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Pipo  Padel mascot">
  <defs>
    <linearGradient id="pipo-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#f0ebe3"/>
    </linearGradient>
    <linearGradient id="pipo-band" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <!-- shadow -->
  <ellipse cx="60" cy="108" rx="34" ry="6" fill="#000" opacity="0.12"/>
  <!-- body  gemoy round -->
  <circle cx="60" cy="68" r="38" fill="url(#pipo-body)" stroke="#c41e3a" stroke-width="2.5"/>
  <!-- blush -->
  <ellipse cx="42" cy="72" rx="8" ry="5" fill="#ffb4b4" opacity="0.55"/>
  <ellipse cx="78" cy="72" rx="8" ry="5" fill="#ffb4b4" opacity="0.55"/>
  <!-- eyes  big friendly -->
  <ellipse cx="48" cy="62" rx="7" ry="9" fill="#1a1a2e"/>
  <ellipse cx="72" cy="62" rx="7" ry="9" fill="#1a1a2e"/>
  <circle cx="50" cy="60" r="2.5" fill="#fff"/>
  <circle cx="74" cy="60" r="2.5" fill="#fff"/>
  <!-- smile -->
  <path d="M46 78 Q60 90 74 78" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
  <!-- headband -->
  <path d="M26 48 Q60 32 94 48 L92 56 Q60 42 28 56 Z" fill="url(#pipo-band)"/>
  <rect x="52" y="34" width="16" height="10" rx="3" fill="#c41e3a"/>
  <text x="60" y="42" text-anchor="middle" font-size="7" font-weight="800" fill="#fff" font-family="system-ui,sans-serif">MP</text>
  <!-- padel racket -->
  <g transform="translate(82,52) rotate(25)">
    <rect x="0" y="0" width="6" height="28" rx="3" fill="#64748b"/>
    <ellipse cx="3" cy="-8" rx="16" ry="20" fill="none" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="-10" y1="-8" x2="16" y2="-8" stroke="#7dd3fc" stroke-width="1" opacity="0.8"/>
    <line x1="-6" y1="-2" x2="12" y2="-2" stroke="#7dd3fc" stroke-width="1" opacity="0.8"/>
    <line x1="-8" y1="-14" x2="14" y2="-14" stroke="#7dd3fc" stroke-width="1" opacity="0.8"/>
  </g>
  <!-- padel ball -->
  <circle cx="22" cy="88" r="9" fill="#facc15" stroke="#ca8a04" stroke-width="1.5"/>
  <path d="M16 88 Q22 82 28 88" fill="none" stroke="#fef08a" stroke-width="1.5"/>
</svg>
